<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프로젝트 데모</title>
  <meta name="description" content="브라우저만으로 동작하는 프로젝트 데모 갤러리 — 번역의 민족 · 싸브리타임" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='4' y='4' width='27' height='56' rx='9' fill='%23624de3'/%3E%3Crect x='33' y='4' width='27' height='56' rx='9' fill='%231D6FD0'/%3E%3C/svg%3E" />
  <style>
    /* ============================================================
       토큰
       ============================================================ */
    :root {
      --accent: #6495EB;
      --bg: #F5F7FC;
      --bg-soft: #EEF1F9;
      --fg: #232842;
      --fg-sub: #6b7191;
      --surface: #ffffff;
      --border: #e5e9f4;
      --chip-bg: #eef2fb;
      --chip-fg: #515a80;
      --mock-surface: #ffffff;
      --mock-line: #e6e9f4;
      --mock-skeleton: #edf0f9;
      --shadow: 0 1px 3px rgba(30,34,70,.05), 0 8px 24px rgba(30,34,70,.06);
      --shadow-hover: 0 12px 34px rgba(30,34,70,.15);
      --font: 'Roboto', 'Noto Sans KR', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    }
    html[data-theme="dark"] {
      --accent: #7DA9F5;
      --bg: #0f1124;
      --bg-soft: #161936;
      --fg: #eceef8;
      --fg-sub: #9ba2c4;
      --surface: #1a1d3a;
      --border: #2b3058;
      --chip-bg: #242953;
      --chip-fg: #b6bce0;
      --mock-surface: #1e2240;
      --mock-line: #2e3358;
      --mock-skeleton: #292e52;
      --shadow: 0 1px 3px rgba(0,0,0,.3), 0 10px 28px rgba(0,0,0,.35);
      --shadow-hover: 0 14px 36px rgba(0,0,0,.5);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background .3s, color .3s;
    }
    a { color: inherit; text-decoration: none; }

    /* ============================================================
       헤더 + 컨트롤
       ============================================================ */
    .wrap { width: 100%; max-width: 1120px; margin: 0 auto; padding: 0 24px; }

    .hub-header { padding-top: 56px; }
    .hub-head-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .hub-header h1 { font-size: clamp(26px, 4vw, 34px); font-weight: 800; letter-spacing: -0.6px; }
    .hub-header h1 .dot { color: var(--accent); }
    .hub-sub { margin-top: 10px; font-size: 15px; line-height: 1.6; color: var(--fg-sub); max-width: 60ch; }

    .theme-toggle {
      flex: none; width: 40px; height: 40px; border-radius: 12px;
      border: 1px solid var(--border); background: var(--surface); color: var(--fg);
      font-size: 17px; cursor: pointer; box-shadow: var(--shadow);
      transition: border-color .2s, transform .15s;
    }
    .theme-toggle:hover { border-color: var(--accent); transform: translateY(-1px); }

    .hub-controls {
      margin-top: 26px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px 14px;
    }
    .search-wrap { position: relative; flex: 1 1 260px; max-width: 340px; }
    .search-wrap svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--fg-sub); pointer-events: none; }
    #search {
      width: 100%; font: inherit; font-size: 14px; color: var(--fg);
      background: var(--surface); border: 1px solid var(--border); border-radius: 999px;
      padding: 10px 16px 10px 36px; outline: none; transition: border-color .2s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--fg-sub); }

    .tag-filters { display: flex; flex-wrap: wrap; gap: 7px; }
    .tag-chip {
      font: inherit; font-size: 12.5px; font-weight: 600; color: var(--chip-fg);
      background: var(--chip-bg); border: 1px solid transparent; border-radius: 999px;
      padding: 6px 12px; cursor: pointer; transition: all .15s;
    }
    .tag-chip:hover { border-color: var(--accent); }
    .tag-chip.active { background: var(--accent); color: #fff; }

    .count { margin-left: auto; font-size: 12.5px; color: var(--fg-sub); white-space: nowrap; }

    /* ============================================================
       그리드 + 카드
       ============================================================ */
    .grid {
      flex: 1; padding: 26px 0 20px;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 22px;
      align-content: start;
    }
    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
      .count { margin-left: 0; flex-basis: 100%; }
    }

    .card {
      position: relative; display: flex; flex-direction: column; gap: 15px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 24px; cursor: pointer;
      border-top: 4px solid var(--point);
      box-shadow: var(--shadow);
      opacity: 0; transform: translateY(20px);
      transition: opacity .55s cubic-bezier(.2,.7,.2,1), transform .55s cubic-bezier(.2,.7,.2,1),
                  box-shadow .2s, border-color .3s, background .3s;
    }
    .card.in { opacity: 1; transform: none; }
    .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-4px); }
    .card.hidden { display: none; }

    .card-head { display: flex; align-items: center; gap: 13px; }
    .card-logo {
      flex: none; width: 48px; height: 48px; border-radius: 13px;
      background: var(--chip-bg); display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .card-logo img { width: 36px; height: 36px; object-fit: contain; }
    .card-logo svg { width: 30px; height: 30px; }
    .card-logo .logo-emoji { font-size: 26px; }
    .card-title h2 { font-size: 19px; font-weight: 800; letter-spacing: -0.3px; }
    .card-title h2 em { font-style: normal; color: var(--point); }
    .card-type { margin-top: 3px; font-size: 12px; font-weight: 600; color: var(--fg-sub); }

    .mock-zone { min-height: 252px; display: flex; align-items: center; justify-content: center; padding: 4px 0; }
    .card:hover .mock-zone > * { transform: translateY(-3px); }
    .mock-zone > * { transition: transform .4s cubic-bezier(.2,.7,.2,1); }

    .tagline { font-size: 14px; line-height: 1.6; color: var(--fg-sub); }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tags span { font-size: 12px; font-weight: 500; color: var(--chip-fg); background: var(--chip-bg); border-radius: 999px; padding: 4px 10px; }

    .card-actions { margin-top: auto; display: flex; flex-direction: column; gap: 11px; padding-top: 4px; }
    .cta {
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      background: var(--point); color: #fff; font-size: 14.5px; font-weight: 700;
      padding: 12px 0; border-radius: 12px; transition: filter .15s;
    }
    .cta:hover { filter: brightness(1.08); }
    .cta .arrow { transition: transform .2s; }
    .card:hover .cta .arrow { transform: translateX(3px); }
    .quick { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
    .quick .qlabel { font-size: 11.5px; color: var(--fg-sub); }
    .qlink {
      font-size: 12px; font-weight: 600; color: var(--point);
      border: 1px solid var(--border); border-radius: 999px; padding: 5px 11px; transition: all .15s;
    }
    .qlink:hover { border-color: var(--point); background: var(--chip-bg); }

    .empty { text-align: center; color: var(--fg-sub); font-size: 14px; padding: 60px 0; }
    .empty.hidden { display: none; }

    footer { padding: 22px 0 42px; font-size: 12.5px; line-height: 1.8; color: var(--fg-sub); }
    footer code { font-family: ui-monospace, Consolas, monospace; font-size: .92em; }

    /* ============================================================
       미니 프리뷰 — 번역의 민족 (강의 화면 + 이중 자막)
       ============================================================ */
    .screen-mock {
      width: 300px; max-width: 100%; aspect-ratio: 16 / 10.2;
      background: var(--mock-surface); border: 1px solid var(--mock-line); border-radius: 13px;
      box-shadow: 0 14px 34px rgba(30,34,70,.14); display: flex; flex-direction: column; overflow: hidden;
    }
    .screen-top { display: flex; align-items: center; gap: 7px; padding: 9px 12px; border-bottom: 1px solid var(--mock-line); }
    .screen-top .wd { width: 8px; height: 8px; border-radius: 50%; background: var(--mock-skeleton); }
    .screen-top .live {
      margin-left: auto; display: inline-flex; align-items: center; gap: 5px;
      font-size: 9.5px; font-weight: 800; letter-spacing: .5px; color: #e5484d;
    }
    .screen-top .live::before { content:''; width: 6px; height: 6px; border-radius: 50%; background: #e5484d; animation: blink 1.6s ease-in-out infinite; }
    .slide { flex: 1; position: relative; padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }
    .sk { height: 9px; border-radius: 5px; background: var(--mock-skeleton); }
    .sk.title { height: 14px; width: 55%; background: color-mix(in srgb, #624de3 22%, var(--mock-skeleton)); }
    .sk.w80 { width: 80%; } .sk.w65 { width: 65%; } .sk.w72 { width: 72%; }
    .mic { position: absolute; right: 14px; bottom: 11px; width: 27px; height: 27px; border-radius: 50%; background: #624de3; display: flex; align-items: center; justify-content: center; }
    .mic::after { content:''; position: absolute; inset: 0; border-radius: 50%; border: 2px solid #624de3; animation: ping 2s cubic-bezier(0,0,.2,1) infinite; }
    .mic svg { width: 13px; height: 13px; }
    .subtitle { position: relative; min-height: 52px; background: rgba(18,20,40,.92); padding: 10px 14px; }
    .sub-pair { position: absolute; inset: 10px 14px auto; animation: subswap 9s ease-in-out infinite; }
    .sub-pair:nth-child(2) { animation-delay: -4.5s; opacity: 0; }
    .sub-en { color: #fff; font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sub-ko { color: rgba(255,255,255,.62); font-size: 10px; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ============================================================
       미니 프리뷰 — 싸브리타임 (폰 프레임 + 실시간 채팅)
       ============================================================ */
    .phone-mock {
      position: relative; height: 244px; aspect-ratio: 0.52;
      background: var(--mock-surface); border: 1px solid var(--mock-line); border-radius: 22px;
      box-shadow: 0 14px 34px rgba(20,40,80,.18); display: flex; flex-direction: column; overflow: hidden;
    }
    .headsup {
      position: absolute; top: 7px; left: 8px; right: 8px; z-index: 2;
      background: var(--mock-surface); border: 1px solid var(--mock-line); border-radius: 11px;
      box-shadow: 0 6px 16px rgba(20,40,80,.22); padding: 7px 9px;
      display: flex; align-items: center; gap: 7px; font-size: 9px; font-weight: 600;
      transform: translateY(-150%); animation: headsup 9s ease-in-out infinite 2s;
    }
    .headsup .hu-icon { flex: none; width: 18px; height: 18px; border-radius: 6px; background: #1D6FD0; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; }
    .headsup .hu-sub { color: var(--fg-sub); font-weight: 400; margin-top: 1px; }
    .ph-status { display: flex; justify-content: space-between; padding: 8px 13px 3px; font-size: 8px; font-weight: 600; color: var(--fg-sub); }
    .ph-header { display: flex; align-items: center; gap: 7px; padding: 7px 11px 8px; border-bottom: 1px solid var(--mock-line); font-size: 11px; font-weight: 700; white-space: nowrap; }
    .ph-header .avatar { flex: none; width: 20px; height: 20px; border-radius: 50%; background: linear-gradient(135deg,#8FD5FF,#6BA9FF); color: #fff; font-size: 9px; display: flex; align-items: center; justify-content: center; }
    .ph-header .online { margin-left: auto; color: #3fb96c; font-size: 8px; font-weight: 500; }
    .ph-chat { flex: 1; padding: 11px 9px; display: flex; flex-direction: column; gap: 7px; }
    .bubble { max-width: 82%; font-size: 10px; line-height: 1.45; padding: 6px 9px; border-radius: 12px; opacity: 0; animation: pop .45s cubic-bezier(.2,.7,.2,1) forwards; }
    .bubble.other { align-self: flex-start; background: var(--mock-skeleton); border-top-left-radius: 4px; }
    .bubble.mine { align-self: flex-end; background: #1D6FD0; color: #fff; border-top-right-radius: 4px; }
    .bubble:nth-child(1) { animation-delay: .7s; }
    .bubble:nth-child(2) { animation-delay: 1.15s; }
    .bubble:nth-child(3) { animation-delay: 1.6s; }
    .typing { align-self: flex-start; display: flex; gap: 4px; padding: 8px 10px; border-radius: 12px; border-top-left-radius: 4px; background: var(--mock-skeleton); opacity: 0; animation: pop .45s 2.1s forwards; }
    .typing i { width: 5px; height: 5px; border-radius: 50%; background: var(--fg-sub); animation: dot 1.2s infinite; }
    .typing i:nth-child(2) { animation-delay: .15s; }
    .typing i:nth-child(3) { animation-delay: .3s; }
    .ph-input { margin: 0 9px 11px; height: 28px; border-radius: 999px; background: var(--mock-skeleton); display: flex; align-items: center; padding: 0 5px 0 11px; font-size: 9.5px; color: var(--fg-sub); }
    .ph-input .send { margin-left: auto; width: 20px; height: 20px; border-radius: 50%; background: #1D6FD0; color: #fff; font-size: 10px; display: flex; align-items: center; justify-content: center; }

    /* ============================================================
       미니 프리뷰 — 기본 (커스텀 목업이 없는 프로젝트)
       ============================================================ */
    .mock-default {
      width: 300px; max-width: 100%; height: 200px; border-radius: 13px;
      border: 1px solid var(--mock-line);
      background: linear-gradient(150deg, color-mix(in srgb, var(--point) 14%, var(--mock-surface)), var(--mock-surface));
      display: flex; align-items: center; justify-content: center; gap: 12px; flex-direction: column;
    }
    .mock-default .glyph { font-size: 52px; line-height: 1; }
    .mock-default .cap { font-size: 12px; font-weight: 600; color: var(--fg-sub); }

    /* ============================================================
       keyframes
       ============================================================ */
    @keyframes blink { 50% { opacity: .25; } }
    @keyframes ping { 75%, 100% { transform: scale(1.7); opacity: 0; } }
    @keyframes subswap { 0%,42% { opacity: 1; transform: none; } 50%,92% { opacity: 0; transform: translateY(-4px); } 100% { opacity: 1; } }
    @keyframes headsup { 0%,4% { transform: translateY(-150%); } 9%,32% { transform: translateY(0); } 38%,100% { transform: translateY(-150%); } }
    @keyframes pop { from { opacity: 0; transform: translateY(7px) scale(.94); } to { opacity: 1; transform: none; } }
    @keyframes dot { 0%,60%,100% { opacity: .25; } 30% { opacity: 1; } }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001s !important; animation-iteration-count: 1 !important; }
      .card { transition: none; opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <header class="hub-header wrap">
    <div class="hub-head-top">
      <div>
        <h1>프로젝트 데모<span class="dot">.</span></h1>
        <p class="hub-sub">브라우저만으로 동작하는 정적 데모 갤러리입니다. 카드를 눌러 데모로 이동하세요.</p>
      </div>
      <button id="theme-toggle" class="theme-toggle" type="button" title="테마 전환" aria-label="테마 전환">🌙</button>
    </div>
    <div class="hub-controls">
      <label class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z"/></svg>
        <input id="search" type="text" placeholder="프로젝트 검색…" autocomplete="off" />
      </label>
      <div id="tag-filters" class="tag-filters"></div>
      <span id="count" class="count"></span>
    </div>
  </header>

  <main id="grid" class="grid wrap" aria-live="polite"></main>
  <p id="empty" class="empty wrap hidden">검색 결과가 없습니다.</p>

  <footer class="wrap">
    모든 데모는 프레임워크·백엔드 없이 <code>index.html</code> 더블클릭(file://)으로 동작합니다.
    각 데모 하단 스트립에서 <b>▶ 데모 시작</b>을 누르면 자동 시연이 재생되고, 시연 중 화면을 직접 조작하면 자동으로 멈춥니다.
  </footer>

  <script>
    /* ============================================================
       프로젝트 데이터 — 새 데모는 여기 객체 하나만 추가하면 카드가 생깁니다.
       필드: id · name(<em>강조</em> 허용) · type · tagline · accent · href
             tags[] · quick[{t,h}] · mock('bunmin'|'ssabree'|null)
             logoImg | logoSvg | emoji (로고 표현 중 하나)
       ============================================================ */
    const PROJECTS = [
      {
        id: 'bunmin',
        name: '<em>번역의</em> 민족',
        type: '실시간 강의 번역 · 웹',
        tagline: '강의를 듣는 순간, 화면의 자막으로 번역됩니다. 강의자·수강자 전체 흐름을 시연합니다.',
        accent: '#624de3',
        href: 'bunmin_demo/index.html',
        logoImg: 'bunmin_demo/assets/bm-logo-cut.png',
        tags: ['실시간 자막', 'AI 번역', 'TTS', '판서 동기화'],
        quick: [
          { t: '▶ 강의자 자동재생', h: '#autoplay' },
          { t: '▶ 수강자 시점', h: '#autoplay-student' },
          { t: '그라디언트', h: '#gradient' },
        ],
        mock: 'bunmin',
      },
      {
        id: 'ssabree',
        name: '<em>싸브리</em>타임',
        type: '교육생 커뮤니티 앱 · Android',
        tagline: 'SSAFY의 하루가 손 안에서 실시간으로. 폰 2대가 채팅·알림·수락을 실시간 동기화합니다.',
        accent: '#1D6FD0',
        href: 'ssabree_demo/index.html',
        logoSvg: "<svg viewBox='0 0 48 48' fill='none' aria-hidden='true'><path d='M24 6C13.5 6 5 13.6 5 23c0 5.6 3.1 10.6 7.9 13.7L11 43l8.6-3.4c1.4.3 2.9.4 4.4.4 10.5 0 19-7.6 19-17S34.5 6 24 6z' stroke='#1D6FD0' stroke-width='3.4' stroke-linejoin='round'/><path d='M19 16l-2.4 14M31.4 16 29 30M15 20.5h18.4M14 25.5h18.4' stroke='#4FA8E8' stroke-width='3' stroke-linecap='round'/></svg>",
        tags: ['익명 게시판', 'AI 검열', '그룹 매칭', '실시간 쪽지'],
        quick: [
          { t: '▶ 자동재생', h: '#autoplay' },
          { t: '▶ 다크', h: '#autoplay+dark' },
          { t: '📱 폰 2대', h: '#dual' },
        ],
        mock: 'ssabree',
      },
    ];

    /* ─── 미니 프리뷰 템플릿 ─── */
    const MOCKS = {
      bunmin() {
        return `<div class="screen-mock" aria-hidden="true">
          <div class="screen-top"><span class="wd"></span><span class="wd"></span><span class="wd"></span><span class="live">LIVE</span></div>
          <div class="slide">
            <span class="sk title"></span><span class="sk w80"></span><span class="sk w65"></span><span class="sk w72"></span>
            <div class="mic"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10v1a7 7 0 0 0 14 0v-1M12 18v4"/></svg></div>
          </div>
          <div class="subtitle">
            <div class="sub-pair"><div class="sub-en">Today, let's look at binary search trees.</div><div class="sub-ko">오늘은 이진 탐색 트리를 살펴보겠습니다.</div></div>
            <div class="sub-pair"><div class="sub-en">Each node has at most two children.</div><div class="sub-ko">각 노드는 최대 두 개의 자식을 가집니다.</div></div>
          </div>
        </div>`;
      },
      ssabree() {
        return `<div class="phone-mock" aria-hidden="true">
          <div class="headsup"><span class="hu-icon">✓</span><div>스터디 지원이 수락되었어요<div class="hu-sub">알고리즘 스터디 · 방금</div></div></div>
          <div class="ph-status"><span>10:24</span><span>📶 🔋</span></div>
          <div class="ph-header"><span class="avatar">박</span> 박싸피 <span class="online">● 온라인</span></div>
          <div class="ph-chat">
            <div class="bubble other">스터디 지원 확인했어요! 환영합니다 🎉</div>
            <div class="bubble mine">감사합니다! 잘 부탁드려요 🙌</div>
            <div class="bubble other">내일 저녁 7시에 첫 모임 어때요?</div>
            <div class="typing"><i></i><i></i><i></i></div>
          </div>
          <div class="ph-input">메시지 입력 <span class="send">↑</span></div>
        </div>`;
      },
      _default(p) {
        return `<div class="mock-default" aria-hidden="true"><span class="glyph">${p.emoji || '🚀'}</span><span class="cap">${escapeHtml(stripTags(p.name))}</span></div>`;
      },
    };

    /* ─── 유틸 ─── */
    function stripTags(s) { return s.replace(/<[^>]+>/g, ''); }
    function escapeHtml(s) { return s.replace(/[&<>]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]; }); }
    function logoHTML(p) {
      if (p.logoImg) return '<img src="' + p.logoImg + '" alt="" />';
      if (p.logoSvg) return p.logoSvg;
      return '<span class="logo-emoji">' + (p.emoji || '🚀') + '</span>';
    }

    /* ─── 카드 렌더 ─── */
    function cardHTML(p, i) {
      const tags = (p.tags || []).map(function (t) { return '<span>' + escapeHtml(t) + '</span>'; }).join('');
      const quick = (p.quick || []).map(function (q) {
        return '<a class="qlink" href="' + p.href + q.h + '">' + escapeHtml(q.t) + '</a>';
      }).join('');
      const quickRow = quick ? '<div class="quick"><span class="qlabel">바로 시작:</span>' + quick + '</div>' : '';
      const mock = (p.mock && MOCKS[p.mock]) ? MOCKS[p.mock]() : MOCKS._default(p);
      const dataTags = (p.tags || []).join('|').toLowerCase();
      const searchText = (stripTags(p.name) + ' ' + p.type + ' ' + p.tagline + ' ' + (p.tags || []).join(' ')).toLowerCase();
      return '<article class="card" style="--point:' + p.accent + '; transition-delay:' + (i * 70) + 'ms"'
        + ' data-href="' + p.href + '" data-tags="' + dataTags + '" data-search="' + escapeHtml(searchText) + '">'
        + '<div class="card-head"><div class="card-logo">' + logoHTML(p) + '</div>'
        + '<div class="card-title"><h2>' + p.name + '</h2><div class="card-type">' + escapeHtml(p.type) + '</div></div></div>'
        + '<div class="mock-zone">' + mock + '</div>'
        + '<p class="tagline">' + escapeHtml(p.tagline) + '</p>'
        + '<div class="tags">' + tags + '</div>'
        + '<div class="card-actions"><a class="cta" href="' + p.href + '">데모 보기 <span class="arrow">→</span></a>' + quickRow + '</div>'
        + '</article>';
    }

    /* ─── 마운트 ─── */
    const grid = document.getElementById('grid');
    grid.innerHTML = PROJECTS.map(cardHTML).join('');

    /* 카드 전체를 클릭 영역으로 (내부 링크는 각자 동작) */
    grid.addEventListener('click', function (e) {
      if (e.target.closest('a')) return;
      const card = e.target.closest('.card');
      if (card) location.href = card.dataset.href;
    });

    /* 등장 애니메이션 (스크롤 진입 시) */
    const cards = Array.prototype.slice.call(grid.querySelectorAll('.card'));
    if ('IntersectionObserver' in window) {
      const io = new IntersectionObserver(function (entries) {
        entries.forEach(function (en) { if (en.isIntersecting) { en.target.classList.add('in'); io.unobserve(en.target); } });
      }, { threshold: 0.12 });
      cards.forEach(function (c) { io.observe(c); });
    } else {
      cards.forEach(function (c) { c.classList.add('in'); });
    }

    /* ─── 태그 필터 + 검색 ─── */
    const allTags = [];
    PROJECTS.forEach(function (p) { (p.tags || []).forEach(function (t) { if (allTags.indexOf(t) === -1) allTags.push(t); }); });
    const tagBox = document.getElementById('tag-filters');
    tagBox.innerHTML = allTags.map(function (t) { return '<button class="tag-chip" type="button" data-tag="' + t.toLowerCase() + '">' + escapeHtml(t) + '</button>'; }).join('');

    const active = new Set();
    const searchEl = document.getElementById('search');
    const countEl = document.getElementById('count');
    const emptyEl = document.getElementById('empty');

    function applyFilter() {
      const q = searchEl.value.trim().toLowerCase();
      let shown = 0;
      cards.forEach(function (card) {
        const tags = card.dataset.tags.split('|');
        const okTag = active.size === 0 || tags.some(function (t) { return active.has(t); });
        const okText = !q || card.dataset.search.indexOf(q) !== -1;
        const show = okTag && okText;
        card.classList.toggle('hidden', !show);
        if (show) shown++;
      });
      countEl.textContent = shown === PROJECTS.length ? ('전체 ' + shown + '개') : (shown + ' / ' + PROJECTS.length + '개');
      emptyEl.classList.toggle('hidden', shown !== 0);
    }

    tagBox.addEventListener('click', function (e) {
      const btn = e.target.closest('.tag-chip');
      if (!btn) return;
      const t = btn.dataset.tag;
      if (active.has(t)) { active.delete(t); btn.classList.remove('active'); }
      else { active.add(t); btn.classList.add('active'); }
      applyFilter();
    });
    searchEl.addEventListener('input', applyFilter);
    applyFilter();

    /* ─── 테마 (localStorage + prefers-color-scheme) ─── */
    (function () {
      const KEY = 'demo-hub-theme';
      const root = document.documentElement;
      const btn = document.getElementById('theme-toggle');
      function apply(t) { root.dataset.theme = t; btn.textContent = t === 'dark' ? '☀️' : '🌙'; }
      let saved = null;
      try { saved = localStorage.getItem(KEY); } catch (e) {}
      apply(saved || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
      btn.addEventListener('click', function () {
        const next = root.dataset.theme === 'dark' ? 'light' : 'dark';
        apply(next);
        try { localStorage.setItem(KEY, next); } catch (e) {}
      });
    })();
  </script>
</body>
</html>
