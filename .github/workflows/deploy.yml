# GitHub Pages 자동 배포
# main 에 푸시될 때마다 사이트를 빌드·배포한다.
# 지금은 정적 파일을 그대로 올리지만, 나중에 React/Vite 등 빌드 스텝이
# 생기면 "Prepare site" 단계를 `npm ci && npm run build` 로 바꾸고
# upload 경로를 dist 로 바꾸기만 하면 된다.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # 배포할 파일만 _site 로 추린다 (.git / .github 제외 → Pages 에 노출 방지)
      - name: Prepare site
        run: |
          mkdir -p _site
          rsync -a --exclude='.git' --exclude='.github' --exclude='_site' ./ _site/

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
